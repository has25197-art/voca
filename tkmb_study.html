<meta charset="UTF-8">
<h2 class="sr-only">TKMB Vocabulary Study Widget</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;
  --border:#2a2a2a;--border2:#3a3a3a;
  --accent:#c8ff00;--accent2:#a8d800;
  --text:#ffffff;--text2:#aaaaaa;--text3:#555555;
  --green:#00e676;--green-bg:#0a2e1a;
  --red:#ff4f4f;--red-bg:#2e0a0a;
}
body{background:var(--bg);font-family:var(--font-sans,'Inter',sans-serif);color:var(--text)}
#app{padding:1.25rem 0}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;gap:8px;flex-wrap:wrap}
.mode-btns{display:flex;gap:6px;flex-wrap:wrap}
.mode-btn{padding:7px 16px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-family:inherit;letter-spacing:0.03em;transition:all 0.15s}
.mode-btn:hover{border-color:var(--accent);color:var(--accent)}
.mode-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:500}
.stats{font-size:13px;color:var(--text3);letter-spacing:0.05em;text-transform:uppercase}

.filter-row{display:flex;gap:12px;margin-bottom:0.75rem;align-items:flex-start}
.chapter-col{display:flex;flex-wrap:wrap;gap:4px;flex:1}
.key-col{flex-shrink:0}
.ch-btn{padding:4px 11px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text3);cursor:pointer;font-size:12px;font-family:inherit;letter-spacing:0.03em;transition:all 0.12s}
.ch-btn:hover{border-color:var(--border2);color:var(--text2)}
.ch-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(200,255,0,0.07)}

.key-btn{padding:6px 14px;border:1px solid var(--accent);border-radius:6px;background:transparent;color:var(--accent);cursor:pointer;font-size:12px;font-family:inherit;letter-spacing:0.04em;font-weight:500;transition:all 0.15s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.key-btn:hover{background:rgba(200,255,0,0.1)}
.key-btn.active{background:var(--accent);color:#000}
.key-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

.key-desc{margin-top:6px;font-size:11px;color:var(--text3);line-height:1.5;max-width:140px}

.order-row{display:flex;gap:6px;margin-bottom:1.25rem}
.order-btn{padding:4px 12px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text3);cursor:pointer;font-size:12px;font-family:inherit;letter-spacing:0.04em;transition:all 0.12s}
.order-btn:hover{border-color:var(--border2);color:var(--text2)}
.order-btn.active{background:var(--bg3);color:var(--text);border-color:var(--border2)}

.progress-bar{height:2px;background:var(--border);border-radius:1px;margin-bottom:1.75rem}
.progress-fill{height:100%;background:var(--accent);border-radius:1px;transition:width 0.3s}

.card-wrap{perspective:1000px;height:300px;margin-bottom:1.25rem;cursor:pointer}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.42s;border-radius:12px;border:1px solid var(--border)}
.card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:var(--bg2)}
.card-back{transform:rotateY(180deg);justify-content:flex-start;align-items:flex-start;overflow:auto;gap:10px}
.word-display{font-size:36px;font-weight:500;color:var(--text);margin-bottom:8px;text-align:center;letter-spacing:-0.01em}
.pos-tag{font-size:11px;color:var(--text3);border:1px solid var(--border);border-radius:4px;padding:3px 10px;margin-bottom:14px;letter-spacing:0.08em;text-transform:uppercase}
.flip-hint{font-size:12px;color:var(--text3);letter-spacing:0.04em}
.back-korean{font-size:26px;font-weight:500;color:var(--accent);line-height:1.3}
.back-def{font-size:15px;color:var(--text2);line-height:1.6}
.back-ex-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-top:4px}
.back-ex{font-size:20px;color:var(--text);line-height:1.7;font-style:italic;border-left:2px solid var(--accent);padding-left:12px}

.nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:1.25rem}
.nav-btn{padding:10px 26px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--text);cursor:pointer;font-size:16px;font-family:inherit;transition:all 0.12s}
.nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.nav-btn:disabled{opacity:0.2;cursor:default}
.card-counter{font-size:14px;color:var(--text3);min-width:80px;text-align:center;letter-spacing:0.05em}
.small-btn{padding:7px 14px;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--text3);cursor:pointer;font-size:12px;font-family:inherit;letter-spacing:0.04em;transition:all 0.12s}
.small-btn:hover{border-color:var(--border2);color:var(--text2)}

.quiz-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:2rem 1.75rem;margin-bottom:1.25rem;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:180px;gap:10px}
.quiz-word{font-size:38px;font-weight:500;color:var(--text);text-align:center;letter-spacing:-0.01em}
.quiz-pos{font-size:12px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase}
.quiz-ex{font-size:20px;color:var(--text2);font-style:italic;text-align:center;max-width:540px;line-height:1.75;margin-top:6px}

.fill-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:2rem 1.75rem;margin-bottom:1.25rem;min-height:180px;display:flex;flex-direction:column;justify-content:center}
.fill-sentence{font-size:20px;line-height:1.8;color:var(--text);font-style:italic}
.fill-blank{display:inline-block;min-width:80px;border-bottom:2px solid var(--accent);color:var(--text3);font-style:normal;font-weight:500;text-align:center;padding:0 4px;letter-spacing:0.05em}
.fill-blank.revealed-correct{color:var(--green);border-color:var(--green)}
.fill-blank.revealed-wrong{color:var(--red);border-color:var(--red)}

.input-row{display:flex;gap:8px;margin-bottom:0.75rem}
.quiz-input{flex:1;padding:12px 16px;font-size:17px;font-family:inherit;border:1px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text);outline:none;transition:border-color 0.15s}
.quiz-input:focus{border-color:var(--accent)}
.quiz-input.correct{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.quiz-input.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.submit-btn{padding:12px 20px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--text);cursor:pointer;font-size:14px;font-family:inherit;white-space:nowrap;transition:all 0.12s;letter-spacing:0.03em}
.submit-btn:hover{background:var(--accent);border-color:var(--accent);color:#000}

.feedback-box{min-height:48px;margin-bottom:0.75rem;padding:12px 16px;border-radius:8px;font-size:15px;line-height:1.5;display:none;border:1px solid transparent}
.feedback-box.show{display:block}
.feedback-box.correct{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.feedback-box.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.answer-reveal{font-size:14px;color:var(--text2);margin-top:5px}
.answer-reveal strong{color:var(--text);font-weight:500}

.quiz-meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--text3)}
.quiz-score-big{font-size:14px;font-weight:500;color:var(--text2)}
.q-counter{font-size:13px;color:var(--text3);letter-spacing:0.04em}
.key-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:10px;letter-spacing:0.04em}
</style>

<div id="app">
  <div class="top-bar">
    <div class="mode-btns">
      <button class="mode-btn active" id="btn-flash" onclick="setMode('flash')">플래시카드</button>
      <button class="mode-btn" id="btn-quiz" onclick="setMode('quiz')">뜻 맞추기</button>
      <button class="mode-btn" id="btn-fill" onclick="setMode('fill')">빈칸 채우기</button>
    </div>
    <span class="stats" id="stats-label"></span>
  </div>

  <div class="filter-row">
    <div class="chapter-col" id="chapter-row"></div>
    <div class="key-col">
      <button class="key-btn" id="key-btn" onclick="toggleKey()">
        <span class="key-dot"></span>핵심 단어
      </button>
      <div class="key-desc" id="key-desc">독해 이해에 필수적인 42개 단어</div>
    </div>
  </div>

  <div class="order-row" id="order-row" style="display:none">
    <button class="order-btn active" id="order-seq" onclick="setOrder('seq')">순서대로</button>
    <button class="order-btn" id="order-rand" onclick="setOrder('rand')">랜덤</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>

  <div id="flash-section">
    <div class="card-wrap" onclick="flipCard()">
      <div class="card" id="card">
        <div class="card-face card-front">
          <div class="word-display" id="word"></div>
          <div class="pos-tag" id="pos-tag"></div>
          <div class="flip-hint">클릭 또는 스페이스바로 뒤집기</div>
        </div>
        <div class="card-face card-back">
          <div class="back-korean" id="b-korean"></div>
          <div class="back-def" id="b-def"></div>
          <div class="back-ex-label">예문</div>
          <div class="back-ex" id="b-ex"></div>
        </div>
      </div>
    </div>
    <div class="nav">
      <button class="nav-btn" id="prev-btn" onclick="prevCard()">←</button>
      <span class="card-counter" id="counter">1 / 1</span>
      <button class="nav-btn" id="next-btn" onclick="nextCard()">→</button>
    </div>
    <div style="display:flex;justify-content:center;gap:8px">
      <button class="small-btn" onclick="flashShuffle()">섞기</button>
      <button class="small-btn" onclick="resetDeck()">처음부터</button>
    </div>
  </div>

  <div id="quiz-section" style="display:none">
    <div class="quiz-card">
      <div class="quiz-word" id="q-word"></div>
      <div class="quiz-pos" id="q-pos"></div>
      <div class="quiz-ex" id="q-ex"></div>
    </div>
    <div class="input-row">
      <input type="text" class="quiz-input" id="q-input" placeholder="한국어 뜻을 입력하세요..." autocomplete="off" autocorrect="off" spellcheck="false" oninput="onTypingQ()">
      <button class="submit-btn" id="q-submit" onclick="submitOrNextQ()">확인 ↵</button>
    </div>
    <div class="feedback-box" id="q-feedback">
      <div id="q-feedback-text"></div>
      <div class="answer-reveal" id="q-answer-reveal"></div>
    </div>
    <div class="quiz-meta">
      <span class="q-counter" id="q-counter"></span>
      <span class="quiz-score-big" id="q-score"></span>
    </div>
    <div class="key-hint">Enter 확인 &nbsp;·&nbsp; → 다음 (답한 후) &nbsp;·&nbsp; ← 이전 &nbsp;·&nbsp; Shift+Enter 건너뛰기</div>
  </div>

  <div id="fill-section" style="display:none">
    <div class="fill-card">
      <div class="fill-sentence" id="f-sentence"></div>
    </div>
    <div class="input-row">
      <input type="text" class="quiz-input" id="f-input" placeholder="빈칸에 들어갈 영어 단어를 입력하세요..." autocomplete="off" autocorrect="off" spellcheck="false" oninput="onTypingF()">
      <button class="submit-btn" id="f-submit" onclick="submitOrNextF()">확인 ↵</button>
    </div>
    <div class="feedback-box" id="f-feedback">
      <div id="f-feedback-text"></div>
      <div class="answer-reveal" id="f-answer-reveal"></div>
    </div>
    <div class="quiz-meta">
      <span class="q-counter" id="f-counter"></span>
      <span class="quiz-score-big" id="f-score"></span>
    </div>
    <div class="key-hint">Enter 확인 &nbsp;·&nbsp; → 다음 (답한 후) &nbsp;·&nbsp; ← 이전 &nbsp;·&nbsp; Shift+Enter 건너뛰기</div>
  </div>
</div>

<script>
const ALL_VOCAB=[{"word":"assuage","pos":"v","korean":"완화시키다","definition":"to lessen or to calm","example":"When it healed, and Jem’s fears of never being able to play football were assuaged, he was seldom self-conscious about his injury.","chapter":1},{"word":"maintain","pos":"v","korean":"주장하다","definition":"to assert or affirm","example":"I maintain that the Ewells started it all, but Jem, who was four years my senior, said it started long before that.","chapter":1},{"word":"consult","pos":"v","korean":"상의하다","definition":"to seek information from; to ask the advice or opinion of","example":"We were far too old to settle an argument with a fist-fight, so we consulted Atticus.","chapter":1},{"word":"apothecary","pos":"n","korean":"약제상","definition":"an early form of a pharmacist; apothecaries could also prescribe drugs.","example":"All we had was Simon Finch, a fur-trapping apothecary from Cornwall whose piety was exceeded only by his stinginess.","chapter":1},{"word":"piety","pos":"n","korean":"경건함, 독실함","definition":"devotion to religious duties and practices","example":"All we had was Simon Finch, a fur-trapping apothecary from Cornwall whose piety was exceeded only by his stinginess.","chapter":1},{"word":"Methodists","pos":"n","korean":"감리교 신자","definition":"members of a branch of a Protestant Christian denomination","example":"","chapter":1},{"word":"brethren","pos":"n","korean":"신도들","definition":"members of a particular church or sect","example":"In England, Simon was irritated by the persecution of those who called themselves Methodists at the hands of their more liberal brethren, and as Simon called himself a Methodist.","chapter":1},{"word":"strictures","pos":"n","korean":"제한, 구속, 제약","definition":"conditions or rules","example":"","chapter":1},{"word":"lest","pos":"conj","korean":"…하지 않으려면","definition":"for fear that; to prevent the possibility of","example":"Mindful of John Wesley’s strictures on the use of many words in buying and selling, Simon made a pile practicing medicine, but in this pursuit he was unhappy lest he be tempted into doing what he knew was not for the glory of God, as the putting on of gold and costly apparel.","chapter":1},{"word":"dictum","pos":"n","korean":"격언","definition":"a formal statement of principle","example":"","chapter":1},{"word":"human chattels","pos":"n","korean":"노예","definition":"","example":"","chapter":1},{"word":"impotent","pos":"adj","korean":"무력한","definition":"powerless","example":"Simon would have regarded with impotent fury the disturbance between the North and the South, as it left his descendants stripped of everything but their land, yet their tradition of living on the land remained unbroken.","chapter":1},{"word":"taciturn","pos":"adj","korean":"말수가 적은, 무뚝뚝한","definition":"almost always silent","example":"Their sister Alexandra was the Finch who remained at the Landing: she married a taciturn man who spent most of his time lying on a hammock by the river wondering if his trot- lines were full.","chapter":1},{"word":"spittoon","pos":"n","korean":"타구 (과거 가래나 침을 뱉는데 쓰던 그릇)","definition":"a jar-like container to spit into; usually used to spit tobacco juice into","example":"","chapter":1},{"word":"unsullied","pos":"adj","korean":"전혀 더럽혀지지 않은, 순수한","definition":"spotlessly clean and fresh","example":"Atticus’s office in the courthouse contained little more than a hat rack, a spittoon, a checkerboard, and an unsullied Code of Alabama.","chapter":1},{"word":"dispatch","pos":"v","korean":"죽이다","definition":"to kill with quick efficiency","example":"","chapter":1},{"word":"imprudent","pos":"adj","korean":"경솔한","definition":"shamelessly bold","example":"The Haverfords had dispatched Maycomb’s leading blacksmith in a misunderstanding arising from the alleged wrongful detention of a mare, were imprudent enough to do it in the presence of three witnesses, and insisted that the son-of-a-bitch had it coming to him was a good enough defense for anybody.","chapter":1},{"word":"sag","pos":"v","korean":"처지다, 늘어지다","definition":"to sink or bend downward under weight or pressure","example":"In rainy weather the streets turned to red slop; grass grew on the sidewalks, the courthouse sagged in the square.","chapter":1},{"word":"sweltering","pos":"adj","korean":"찌는 듯이 더운","definition":"oppressively hot and humid","example":"Somehow, it was hotter then: a black dog suffered on a summer’s day; bony mules hitched to Hoover carts flicked flies in the sweltering shade of the live oaks on the square.","chapter":1},{"word":"wilt","pos":"v","korean":"시들다, 축 늘어지다","definition":"to become limp or lose firmness, typically due to heat or lack of moisture","example":"","chapter":1},{"word":"talcum","pos":"n","korean":"탈크","definition":"a fine, soft powder made from talc, used primarily as a cosmetic or for personal hygiene","example":"Ladies bathed before noon, after their three- o’clock naps, and by nightfall were like soft tea cakes with frostings of sweat and sweet talcum.","chapter":1},{"word":"amble","pos":"v","korean":"느긋하게 걷다","definition":"to walk at a slow, leisurely pace","example":"They ambled across the square, shuffled in and out of the stores around it, took their time about everything.","chapter":1},{"word":"satisfactory","pos":"adj","korean":"만족할 만한","definition":"meeting requirements","example":"","chapter":1},{"word":"detachment","pos":"n","korean":"초연, 공평","definition":"freedom from bias or prejudice","example":"Jem and I found our father satisfactory: he played with us, read to us, and treated us with courteous detachment. angles and bones: 매우 마른 very thin She was all angles and bones.","chapter":1},{"word":"epic","pos":"adj","korean":"서사시의","definition":"extending beyond the usual or ordinary, especially in size or scope","example":"Our battles were epic and one-sided. Calpurnia always won, mainly because Atticus always took her side.","chapter":1},{"word":"tyrannical","pos":"adj","korean":"폭군적인, 전제적인","definition":"characteristic of an const KEY_WORDS={"malevolent": true, "taciturn": true, "piety": true, "impotent": true, "predilection": true, "entailment": true, "mortification": true, "contemptuous": true, "compromise": true, "cowardice": true, "melancholy": true, "benevolence": true, "morbid": true, "aberration": true, "guilelessness": true, "fanatical": true, "remorseful": true, "cantankerous": true, "rectitude": true, "palliation": true, "apoplectic": true, "umbrage": true, "denunciation": true, "austere": true, "hereditary": true, "acquiescence": true, "venerable": true, "defiance": true, "formidable": true, "corroborating evidence": true, "contempt": true, "acrimonious": true, "serene": true, "indigenous": true, "compassion": true, "mollify": true, "volition": true, "candid": true, "conscience": true, "predicament": true, "convict": true, "impudent": true};

let mode='flash',quizOrder='seq',currentChapter=0,keyOnly=false;
let deck=[],cardIdx=0,flipped=false;
let qPool=[],qIdx=0,qAnswered=false,qCurrent=null,qScore=0,qTotal=0,qHistory=[];
let fPool=[],fIdx=0,fAnswered=false,fCurrent=null,fScore=0,fTotal=0,fHistory=[];

function getDeck(){
  let d=currentChapter===0?[...ALL_VOCAB]:ALL_VOCAB.filter(v=>v.chapter===currentChapter);
  if(keyOnly)d=d.filter(v=>KEY_WORDS[v.word.toLowerCase()]);
  return d;
}
function getFillDeck(){return getDeck().filter(v=>v.example&&v.example.trim());}
function shuffleArr(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function toggleKey(){
  keyOnly=!keyOnly;
  document.getElementById('key-btn').classList.toggle('active',keyOnly);
  document.getElementById('key-desc').textContent=keyOnly?'챕터 필터도 함께 적용됩니다':'독해 이해에 필수적인 42개 단어';
  refresh();
}
function setChapter(ch){
  currentChapter=ch;
  document.querySelectorAll('.ch-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('ch-'+ch).classList.add('active');
  refresh();
}
function setOrder(o){
  quizOrder=o;
  document.getElementById('order-seq').classList.toggle('active',o==='seq');
  document.getElementById('order-rand').classList.toggle('active',o==='rand');
  if(mode==='quiz'){qScore=0;qTotal=0;initPool('q',true);}
  else if(mode==='fill'){fScore=0;fTotal=0;initPool('f',true);}
}
function refresh(){
  if(mode==='flash')resetDeck();
  else if(mode==='quiz'){qScore=0;qTotal=0;initPool('q',true);}
  else{fScore=0;fTotal=0;initPool('f',true);}
}
function setMode(m){
  mode=m;
  ['flash','quiz','fill'].forEach(x=>document.getElementById('btn-'+x).classList.toggle('active',x===m));
  document.getElementById('flash-section').style.display=m==='flash'?'':'none';
  document.getElementById('quiz-section').style.display=m==='quiz'?'':'none';
  document.getElementById('fill-section').style.display=m==='fill'?'':'none';
  document.getElementById('order-row').style.display=m!=='flash'?'':'none';
  refresh();
}
function buildChapterRow(){
  const row=document.getElementById('chapter-row');
  const chapters=[0,...Array.from(new Set(ALL_VOCAB.map(v=>v.chapter))).sort((a,b)=>a-b)];
  chapters.forEach(ch=>{
    const b=document.createElement('button');
    b.className='ch-btn'+(ch===0?' active':'');b.id='ch-'+ch;
    b.textContent=ch===0?'전체':'Ch '+ch;
    b.onclick=()=>setChapter(ch);row.appendChild(b);
  });
}
function resetDeck(){deck=getDeck();cardIdx=0;flipped=false;document.getElementById('card').classList.remove('flipped');updateCard();}
function flashShuffle(){deck=shuffleArr(getDeck());cardIdx=0;flipped=false;document.getElementById('card').classList.remove('flipped');updateCard();}
function updateCard(){
  if(!deck.length)return;
  const e=deck[cardIdx];
  document.getElementById('word').textContent=e.word;
  document.getElementById('pos-tag').textContent=e.pos;
  document.getElementById('b-korean').textContent=e.korean;
  document.getElementById('b-def').textContent=e.definition;
  document.getElementById('b-ex').textContent=e.example||'—';
  document.getElementById('counter').textContent=(cardIdx+1)+' / '+deck.length;
  document.getElementById('prev-btn').disabled=cardIdx===0;
  document.getElementById('next-btn').disabled=cardIdx===deck.length-1;
  document.getElementById('prog').style.width=(deck.length>1?cardIdx/(deck.length-1)*100:100)+'%';
  document.getElementById('stats-label').textContent=deck.length+'개 단어';
}
function flipCard(){flipped=!flipped;document.getElementById('card').classList.toggle('flipped',flipped);}
function prevCard(){if(cardIdx>0){cardIdx--;flipped=false;document.getElementById('card').classList.remove('flipped');updateCard();}}
function nextCard(){if(cardIdx<deck.length-1){cardIdx++;flipped=false;document.getElementById('card').classList.remove('flipped');updateCard();}}

function setProgress(idx,total){document.getElementById('prog').style.width=(total>1?idx/(total-1)*100:100)+'%';}
function initPool(t,goFirst){
  if(t==='q'){
    qPool=getDeck();if(quizOrder==='rand')shuffleArr(qPool);
    qIdx=0;qHistory=[];
    document.getElementById('stats-label').textContent=qPool.length+'개 단어';
    if(goFirst)loadQ(0);
  }else{
    fPool=getFillDeck();if(quizOrder==='rand')shuffleArr(fPool);
    fIdx=0;fHistory=[];
    document.getElementById('stats-label').textContent=fPool.length+'개 단어';
    if(goFirst)loadF(0);
  }
}

function normKo(s){return s.trim().replace(/[,，、·\/]+/g,' ').replace(/\s+/g,' ').trim().toLowerCase();}
function checkKo(inp,ans){
  const a=normKo(inp),b=normKo(ans);
  if(a===b)return true;
  const ap=a.split(/[\s,]+/),bp=b.split(/[\s,]+/);
  return ap.some(p=>p.length>=2&&bp.some(q=>q===p||q.includes(p)||p.includes(q)));
}
function normEn(s){return s.trim().toLowerCase().replace(/[^a-z]/g,'');}
function checkEn(inp,ans){
  const a=normEn(inp),b=normEn(ans);
  if(a===b)return true;
  if(b.startsWith(a)&&a.length>=Math.max(3,b.length-2))return true;
  return false;
}

function loadQ(idx){
  if(!qPool.length)return;
  idx=Math.max(0,Math.min(idx,qPool.length-1));
  qIdx=idx;qAnswered=false;qCurrent=qPool[qIdx];

  if(hist){

  }
  document.getElementById('q-counter').textContent=(qIdx+1)+' / '+qPool.length;
  setProgress(qIdx,qPool.length);updateScore('q');
}

function makeSentenceHTML(sentence,word,state){
  const escaped=word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const re=new RegExp('\\b'+escaped+'\\w*','i');
  const match=sentence.match(re);
  const found=match?match[0]:word;
  const blanks='_'.repeat(Math.max(4,found.length));
  const cls=state==='correct'?' revealed-correct':state==='wrong'?' revealed-wrong':'';
  const display=(state==='correct'||state==='wrong')?found:blanks;
  return sentence.replace(re,'<span class="fill-blank'+cls+'">'+display+'</span>');
}

function updateScore(t){
  if(t==='q'){document.getElementById('q-score').textContent=qTotal===0?'':qScore+' / '+qTotal+' ('+Math.round(qScore/qTotal*100)+'%)';}
  else{document.getElementById('f-score').textContent=fTotal===0?'':fScore+' / '+fTotal+' ('+Math.round(fScore/fTotal*100)+'%)';}
}

document.addEventListener('keydown',function(e){
  const isInput=document.activeElement&&(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA');
  const inputDisabled=isInput&&document.activeElement.disabled;
  if(mode==='quiz'){
    if(e.key==='Enter'&&e.shiftKey){e.preventDefault();skipQ();return;}
    if(e.key==='Enter'){e.preventDefault();submitOrNextQ();return;}
    if(e.key==='ArrowRight'&&(!isInput||inputDisabled)){e.preventDefault();if(qAnswered)loadQ(qIdx+1);return;}
    if(e.key==='ArrowLeft'&&(!isInput||inputDisabled)){e.preventDefault();loadQ(qIdx-1);return;}
  }
  if(mode==='fill'){
    if(e.key==='Enter'&&e.shiftKey){e.preventDefault();skipF();return;}
    if(e.key==='Enter'){e.preventDefault();submitOrNextF();return;}
    if(e.key==='ArrowRight'&&(!isInput||inputDisabled)){e.preventDefault();if(fAnswered)loadF(fIdx+1);return;}
    if(e.key==='ArrowLeft'&&(!isInput||inputDisabled)){e.preventDefault();loadF(fIdx-1);return;}
  }
  if(mode==='flash'){
    if(e.key==='ArrowRight'){e.preventDefault();nextCard();}
    if(e.key==='ArrowLeft'){e.preventDefault();prevCard();}
    if(e.key===' '){e.preventDefault();flipCard();}
  }
});

buildChapterRow();
